# Local dev stack for AML Advisor.
#
# Postgres 16 with the pgvector extension — the same engine (and same SQL) that
# would run on Aurora Postgres in a bank prod deployment. This is deliberate:
# there is no code path that works locally but not in prod. `docker compose up -d`
# gives you the same database Aurora would give you inside the bank's VPC.
#
# Usage:
#   docker compose up -d           # start Postgres
#   python scripts/ingest_mdds.py  # build the chunks table + HNSW index
#   docker compose down            # stop (data persists in the pgdata volume)
#   docker compose down -v         # stop and wipe (fresh start)

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aml-advisor-postgres
    environment:
      POSTGRES_USER: aml
      POSTGRES_PASSWORD: aml
      POSTGRES_DB: aml_advisor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aml -d aml_advisor"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  pgdata:
